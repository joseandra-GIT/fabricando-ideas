<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabricando Ideas | Ingeniería Creativa</title>
    <!-- Cargamos React, ReactDOM y Babel para procesar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scan-logo {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scan-logo { animation: scan-logo 3s ease-in-out infinite; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        body, html { margin: 0; padding: 0; background-color: #050505; color: white; overflow-x: hidden; font-family: sans-serif; }
        @media (hover: hover) and (pointer: fine) {
            * { cursor: none !important; }
        }
        selection { background-color: #ff8c00; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONOS SVG INLINE (Para evitar dependencias externas) ---
        const IconSettings = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );
        const IconZap = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        );
        const IconTarget = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        );
        const IconCpu = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>
        );
        const IconRocket = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.95.7-2.29 0-3.5-.12-.21-.3-.39-.5-.5-1.21-.7-2.55-.71-3.5 0z"/><path d="m12 15-3-3m1.5 1.5L15 9m-1.5 1.5 3 3M9 15l3 3m1.5-1.5L15 21m-1.5-1.5 3-3m-3-1.5 3 3m-1.5-1.5L21 15m-1.5-1.5 3-3"/><path d="M9 15 3 9l15-6 6 15-6-3-6 6Z"/></svg>
        );
        const IconBrain = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2a2.5 2.5 0 0 1 0 5 2.5 2.5 0 0 1 0-5z"/><path d="M14.5 2a2.5 2.5 0 0 1 0 5 2.5 2.5 0 0 1 0-5z"/><path d="M20 9.5a2.5 2.5 0 0 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M9 9.5a2.5 2.5 0 0 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M12 14.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M17 14.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M14.5 20a2.5 2.5 0 0 1-5 0 2.5 2.5 0 0 1 5 0z"/></svg>
        );

        // --- FONDO LÁSER ---
        const LaserCuttingBackground = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let particles = [];
                const mouse = { x: -1000, y: -1000, active: false };
                let scanLineY = 0;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                class Spark {
                    constructor(x, y) {
                        this.x = x; this.y = y;
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 4 + 2;
                        this.vx = Math.cos(angle) * speed;
                        this.vy = Math.sin(angle) * speed;
                        this.life = 1;
                        this.size = Math.random() * 2 + 1;
                        this.color = Math.random() > 0.5 ? '#ff8c00' : '#ffffff';
                    }
                    update() { this.x += this.vx; this.y += this.vy; this.life -= 0.03; this.size *= 0.95; }
                    draw() {
                        ctx.save();
                        ctx.globalAlpha = Math.max(0, this.life);
                        ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                        ctx.fillStyle = this.color;
                        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                        ctx.restore();
                    }
                }

                const onMove = (e) => {
                    mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
                    for (let i = 0; i < 3; i++) particles.push(new Spark(mouse.x, mouse.y));
                };

                window.addEventListener('mousemove', onMove);
                window.addEventListener('resize', resize);
                resize();

                const animate = () => {
                    const w = canvas.width, h = canvas.height;
                    if (!h) return requestAnimationFrame(animate);
                    
                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, w, h);

                    // Rejilla
                    ctx.strokeStyle = 'rgba(255, 140, 0, 0.05)';
                    ctx.lineWidth = 1;
                    for (let x = 0; x < w; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
                    for (let y = 0; y < h; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

                    // Escaneo
                    scanLineY = (scanLineY + 2) % h;
                    const gs = scanLineY - 50, ge = scanLineY + 50;
                    if (Number.isFinite(gs)) {
                        try {
                            const grad = ctx.createLinearGradient(0, gs, 0, ge);
                            grad.addColorStop(0, 'transparent'); grad.addColorStop(0.5, 'rgba(255, 140, 0, 0.15)'); grad.addColorStop(1, 'transparent');
                            ctx.fillStyle = grad; ctx.fillRect(0, gs, w, 100);
                        } catch(e){}
                    }

                    // Láser
                    if (mouse.active) {
                        ctx.strokeStyle = 'rgba(255, 140, 0, 0.5)';
                        [{x:0,y:0},{x:w,y:0},{x:0,y:h},{x:w,y:h}].forEach(c => {
                            ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
                        });
                        ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 4, 0, Math.PI * 2);
                        ctx.fillStyle = 'white'; ctx.fill();
                    }

                    for (let i = particles.length - 1; i >= 0; i--) {
                        particles[i].update();
                        if (particles[i].life <= 0) particles.splice(i, 1);
                        else particles[i].draw();
                    }
                    requestAnimationFrame(animate);
                };
                animate();
                return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('resize', resize); };
            }, []);

            return <canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full pointer-events-none z-0" />;
        };

        // --- CURSOR ---
        const CustomCursor = () => {
            const [pos, setPos] = useState({ x: -100, y: -100 });
            const [hover, setHover] = useState(false);

            useEffect(() => {
                const move = (e) => setPos({ x: e.clientX, y: e.clientY });
                const over = (e) => setHover(!!e.target.closest('button, a, .interactive-hover'));
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseover', over);
                return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseover', over); };
            }, []);

            return (
                <div className="hidden md:block">
                    <div className="fixed top-0 left-0 w-8 h-8 border border-[#ff8c00] rounded-full pointer-events-none z-[9999] transition-transform duration-100"
                         style={{ transform: `translate(${pos.x - 16}px, ${pos.y - 16}px) scale(${hover ? 1.5 : 1})` }}>
                        <div className="absolute top-1/2 left-0 w-full h-[1px] bg-[#ff8c00] opacity-50"></div>
                        <div className="absolute left-1/2 top-0 w-[1px] h-full bg-[#ff8c00] opacity-50"></div>
                    </div>
                    <div className="fixed top-0 left-0 w-1.5 h-1.5 bg-white rounded-full pointer-events-none z-[10000]"
                         style={{ transform: `translate(${pos.x - 3}px, ${pos.y - 3}px)` }} />
                </div>
            );
        };

        // --- APP PRINCIPAL ---
        function App() {
            const [navError, setNavError] = useState(false);
            const [heroError, setHeroError] = useState(false);
            const logo = "logo.jpg"; // Asegúrate de que el archivo se llame así en GitHub

            return (
                <div className="min-h-screen bg-[#050505] text-white overflow-x-hidden selection:bg-[#ff8c00]">
                    <CustomCursor />
                    <LaserCuttingBackground />

                    <nav className="relative z-10 flex justify-between items-center px-6 md:px-16 py-6 bg-black/40 border-b border-[#ff8c00]/20 backdrop-blur-md">
                        <div className="flex items-center gap-3">
                            {!navError ? (
                                <img src={logo} className="h-10 w-auto" onError={() => setNavError(true)} />
                            ) : (
                                <IconSettings className="w-8 h-8 text-[#ff8c00] animate-spin-slow" />
                            )}
                            <span className="hidden md:block text-[#ff8c00] font-bold text-xl tracking-tighter uppercase italic">fabricando ideas</span>
                        </div>
                        <div className="hidden md:flex gap-8 text-[10px] font-bold tracking-widest text-gray-400 uppercase">
                            <a href="#" className="hover:text-white transition-colors">Laboratorio</a>
                            <a href="#" className="hover:text-white transition-colors">Procesamiento</a>
                            <a href="#" className="hover:text-white transition-colors">Resultados</a>
                        </div>
                        <button className="px-5 py-2 border border-[#ff8c00] text-[#ff8c00] text-[10px] font-bold uppercase tracking-widest hover:bg-[#ff8c00] hover:text-black transition-all">Iniciar</button>
                    </nav>

                    <main className="relative z-10 flex flex-col items-center justify-center min-h-[80vh] px-6 text-center">
                        <div className="mb-10 relative group">
                            <div className="absolute inset-0 bg-[#ff8c00] blur-[100px] opacity-10 group-hover:opacity-20 transition-opacity"></div>
                            {!heroError ? (
                                <img src={logo} className="relative h-48 md:h-64 w-auto drop-shadow-2xl" onError={() => setHeroError(true)} />
                            ) : (
                                <IconSettings className="w-32 h-32 text-[#ff8c00] animate-spin-slow" />
                            )}
                        </div>

                        <h1 className="text-5xl md:text-8xl font-black tracking-tighter mb-6 uppercase italic leading-none">
                            Corte <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#ff8c00] to-white">Láser</span><br/>de Conceptos
                        </h1>
                        <p className="max-w-2xl text-gray-400 text-lg md:text-xl font-light italic mb-10">Fabricamos soluciones digitales con la exactitud de un haz de luz concentrado.</p>
                        
                        <div className="flex flex-col sm:flex-row gap-4">
                            <button className="px-10 py-4 bg-[#ff8c00] text-black font-black uppercase text-xs tracking-widest hover:bg-white transition-colors">Cortar Proyecto</button>
                            <button className="px-10 py-4 border border-white/10 font-black uppercase text-xs tracking-widest hover:border-[#ff8c00] hover:text-[#ff8c00] transition-all">Muestrario</button>
                        </div>
                    </main>

                    <section className="relative z-10 py-24 px-6 md:px-16 grid grid-cols-1 md:grid-cols-3 gap-12 max-w-7xl mx-auto">
                        <div className="p-8 bg-white/5 border-l border-[#ff8c00]/30">
                            <IconTarget className="w-10 h-10 text-[#ff8c00] mb-6" />
                            <h3 className="font-bold uppercase tracking-widest mb-4">Punto Focal</h3>
                            <p className="text-gray-500 text-sm">Concentramos todo nuestro potencial creativo en los objetivos críticos de tu negocio.</p>
                        </div>
                        <div className="p-8 bg-white/5 border-l border-[#ff8c00]/30">
                            <IconCpu className="w-10 h-10 text-[#ff8c00] mb-6" />
                            <h3 className="font-bold uppercase tracking-widest mb-4">Grabado CNC</h3>
                            <p className="text-gray-500 text-sm">Cada línea de código es procesada con algoritmos de alta eficiencia.</p>
                        </div>
                        <div className="p-8 bg-white/5 border-l border-[#ff8c00]/30">
                            <IconZap className="w-10 h-10 text-[#ff8c00] mb-6" />
                            <h3 className="font-bold uppercase tracking-widest mb-4">Alta Potencia</h3>
                            <p className="text-gray-500 text-sm">Potenciamos tu marca con interfaces que brillan con luz propia.</p>
                        </div>
                    </section>

                    <footer className="relative z-10 py-10 text-center border-t border-white/5 font-mono text-[10px] text-gray-600 tracking-widest">
                        © 2026 FABRICANDO IDEAS // CNC_TERM_ID: 0x4F92
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
